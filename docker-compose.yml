version: '3.8'

services:
  ai_resume_api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=llama-3.1-8b-instant
      - GROQ_TEMPERATURE=1.0
      - GROQ_MAX_TOKENS=1024
      - DEBUG=False
      - LOG_LEVEL=INFO
    volumes:
      - ./resumes:/app/resumes
      - ./ai_backend:/app/ai_backend
    container_name: ai_resume_generator
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ai_resume_api
    container_name: ai_resume_nginx
    restart: unless-stopped
